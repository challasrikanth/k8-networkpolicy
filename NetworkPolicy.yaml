apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-only-one-pod-from-default
  namespace: roboshop
spec:
  podSelector:
    matchLabels:
      app: roboshop
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: default
      podSelector:
        matchLabels:
          app: default1
